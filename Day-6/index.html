<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">

    <!-- 
           Flex box in css:--
           -------------------
           flex box is used to align the items into main axis and cross axis and making responsive

           two types:--
           -------------------
           ->parent properties
                    selector{
                    property:value;
                       display :flex;
                    }


           ->child Properties




           display:flex;

           justify-content:start;
           align-items:stretch;
           flex-direction:row;
           flex-wrap:nowrap
           flex-flow:direction wrap;

    
    
    -->
</head>
<body>

    <div class="container">
        <div class="child-1">
                <div class="subchild-1">item-1</div>
                <div class="subchild-2">item-2</div>
                <div class="subchild-3">item-3</div>
                <div class="subchild-4">item-4</div>
        </div>
        <div class="child-2">
                 <p>Search</p>
        </div>
      
    </div>
    
</body>
</html>
